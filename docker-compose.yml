version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    environment:
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://compliance_user:${POSTGRES_PASSWORD}@postgres:5432/compliance_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./compliance_monitor:/app/compliance_monitor
      - ./logs:/app/logs
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance_monitor
    environment:
      - DATABASE_URL=postgresql://compliance_user:${POSTGRES_PASSWORD}@postgres:5432/compliance_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - ENABLED_JURISDICTIONS=US,EU
      - DEFAULT_RISK_THRESHOLD=0.7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./compliance_monitor:/app/compliance_monitor
      - ./logs:/app/logs
    command: python run_monitor.py

volumes:
  postgres_data:
  redis_data:
